name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  VEX_REPO: PlanMorph-Org/vex
  VEX_RELEASE_TAG: ${{ vars.VEX_RELEASE_TAG }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            exe: .exe
          - runner: macos-latest   # arm64 (Apple Silicon, macos-14)
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            exe: ""
          # Cross-compile macOS Intel from the Apple Silicon runner. The
          # macos-latest image ships the x86_64 SDK, and the macos-13 (Intel)
          # runner pool is being deprecated by GitHub — jobs scheduled on it
          # routinely sit queued for hours and were the reason every v0.1.0
          # release was stuck. fail-fast:false + needs:build means one stuck
          # job blocks the entire release, so we keep everything on the
          # current runner image.
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            exe: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          save-if: false

# keyring v2 uses the OS-native secret store with no extra dependencies:
      #   macOS   → Keychain Services
      #   Windows → Windows Credential Manager

      - name: Build Vex Atlas desktop agent
        run: cargo build --release -p vex-bridge --features tray,desktop --target ${{ matrix.target }}

      - name: Download vex from latest vex release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.VEX_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$VEX_RELEASE_TAG"
          if [[ -z "$tag" ]]; then
            tag="$(gh release view --repo "$VEX_REPO" --json tagName -q .tagName)"
          fi
          asset="vex-${tag}-${{ matrix.artifact_suffix }}.tar.gz"
          mkdir -p vex-stage
          gh release download "$tag" --repo "$VEX_REPO" \
            --pattern "$asset" --dir vex-stage
          tar -xzf "vex-stage/$asset" -C vex-stage
          extracted="vex-stage/vex-${tag}-${{ matrix.artifact_suffix }}"
          bin="$extracted/vex${{ matrix.exe }}"
          test -f "$bin"
          # Integrity gate: the vex release bundles a SHA256SUMS computed by its
          # own build. Verify the extracted binary against it before we ship it
          # inside Vex Atlas, so a truncated/corrupted download can never be
          # silently bundled into a release that users install.
          if [[ -f "$extracted/SHA256SUMS" ]]; then
            ( cd "$extracted" && \
              if command -v sha256sum >/dev/null 2>&1; then \
                sha256sum --check --strict "SHA256SUMS"; \
              else \
                shasum -a 256 --check --strict "SHA256SUMS"; \
              fi )
          else
            echo "::error::vex bundle $asset is missing SHA256SUMS; refusing to ship an unverifiable engine"
            exit 1
          fi
          echo "VEX_BIN_PATH=$bin" >> "$GITHUB_ENV"

      # ── Package ──────────────────────────────────────────────────────────
      # Publish one raw bundle per platform. On Windows we also publish a
      # single per-user setup executable that installs vex, vex-bridge, and
      # vex-tray together, registers tray startup, and launches browser pairing.
      - name: Package artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXE="${{ matrix.exe }}"
          BIN="vex-bridge${EXE}"
          TRAY="vex-tray${EXE}"
          DESKTOP="vex-desktop${EXE}"
          VEX="vex${EXE}"
          DIR="dist/vex-bridge-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "$DIR" dist

          cp "target/${{ matrix.target }}/release/${BIN}" "$DIR/${BIN}"
          cp "target/${{ matrix.target }}/release/${TRAY}" "$DIR/${TRAY}"
          cp "target/${{ matrix.target }}/release/${DESKTOP}" "$DIR/${DESKTOP}"
          cp "$VEX_BIN_PATH" "$DIR/${VEX}"

          ( cd "$DIR" && sha256sum "${BIN}" "${TRAY}" "${DESKTOP}" "${VEX}" > SHA256SUMS )
          ARCHIVE="${DIR}.tar.gz"
          tar -czf "$ARCHIVE" -C dist "vex-bridge-${VERSION}-${{ matrix.artifact_suffix }}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Install Inno Setup
        if: matrix.artifact_suffix == 'windows-x86_64'
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build Windows setup executable
        if: matrix.artifact_suffix == 'windows-x86_64'
        shell: powershell
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $source = Join-Path $env:GITHUB_WORKSPACE "dist\vex-bridge-$version-windows-x86_64"
          $output = Join-Path $env:GITHUB_WORKSPACE "dist"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          & $iscc "installer\windows\VexAtlasSetup.iss" "/DAppVersion=$version" "/DSourceDir=$source" "/DOutputDir=$output"
          $setup = Join-Path $output "VexAtlasSetup-$version-windows-x86_64.exe"
          if (!(Test-Path $setup)) { throw "setup executable not found: $setup" }
          "SETUP_EXE=$setup" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-bridge-${{ matrix.artifact_suffix }}-bundle
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.SETUP_EXE }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          # Aggregate one SHA256SUMS.txt across every published archive and
          # installer. The in-app updater downloads this alongside an asset and
          # verifies the bytes before swapping anything on disk, so a corrupted
          # or tampered download is rejected instead of installed.
          out="dist/SHA256SUMS.txt"
          : > "$out"
          while IFS= read -r -d '' file; do
            ( cd "$(dirname "$file")" && sha256sum "$(basename "$file")" ) >> "$out"
          done < <(find dist -type f \( -name '*.tar.gz' -o -name '*.exe' \) -print0 | sort -z)
          cat "$out"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Per platform we publish raw .tar.gz bundles containing vex-bridge,
          # vex-tray, vex, and SHA256SUMS. Windows also gets a one-click setup
          # executable for normal users. SHA256SUMS.txt lets the in-app updater
          # verify any download before installing it.
          files: |
            dist/**/*.tar.gz
            dist/**/*.exe
            dist/SHA256SUMS.txt
            docs/early-access-distribution.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
