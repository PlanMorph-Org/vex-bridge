name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            exe: .exe
          - runner: macos-latest   # arm64 (Apple Silicon, macos-14)
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            exe: ""
          - runner: macos-13       # Intel
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            exe: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

# keyring v2 uses the OS-native secret store with no extra dependencies:
      #   macOS   → Keychain Services
      #   Windows → Windows Credential Manager

      - name: Build vex-bridge
        run: cargo build --release -p vex-bridge --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────
      - name: Package artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXE="${{ matrix.exe }}"
          DIR="dist/vex-bridge-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "$DIR"

          cp "target/${{ matrix.target }}/release/vex-bridge${EXE}" "$DIR/vex-bridge${EXE}"

          cd "$DIR"
          sha256sum "vex-bridge${EXE}" > SHA256SUMS
          cd ../..

          tar -czf "${DIR}.tar.gz" -C dist "vex-bridge-${VERSION}-${{ matrix.artifact_suffix }}"
          echo "ARCHIVE=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-bridge-${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Binary archives (one per platform) + installer scripts that users
          # run directly from the Releases page (curl | bash / irm | iex).
          files: |
            dist/**/*.tar.gz
            install/install.sh
            install/install.ps1
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
